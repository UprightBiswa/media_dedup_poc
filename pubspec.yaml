name: media_dedup_poc
description: Offline-first Flutter POC for media de-duplication and synthesis.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  path: ^1.9.1
  path_provider: ^2.1.5
  crypto: ^3.0.6
  image: ^4.5.4
  collection: ^1.19.1
  objectbox: ^5.1.0
  objectbox_flutter_libs: ^5.1.0
  permission_handler: ^12.0.1
  file_picker: ^10.3.3
  photo_manager: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  objectbox_generator: ^5.1.0

flutter:
  uses-material-design: true
